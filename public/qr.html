<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Share the Love – Ran & Rox</title>
  <link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Montserrat:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f0ede8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      font-family: 'Montserrat', sans-serif;
    }

    /* ── The printable card ── */
    .card {
      background: #fff;
      width: 420px;
      padding: 52px 44px 44px;
      text-align: center;
      position: relative;
    }

    /* Thin black border */
    .card::before {
      content: '';
      position: absolute;
      inset: 10px;
      border: 1px solid #000;
      pointer-events: none;
    }

    .share-word {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 7px;
      text-transform: uppercase;
      color: #000;
      margin-bottom: 0px;
    }

    .script-love {
      font-family: 'Sacramento', cursive;
      font-size: 96px;
      line-height: 1.05;
      color: #000;
      margin-bottom: 18px;
    }

    .thin-line {
      width: 50px;
      height: 1px;
      background: #000;
      margin: 0 auto 22px;
    }

    .upload-heading {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #000;
      margin-bottom: 5px;
    }

    .upload-sub {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 300;
      font-style: italic;
      color: #333;
      margin-bottom: 26px;
    }

    .qr-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 26px;
    }

    .qr-wrap img {
      display: block;
      width: 175px;
      height: 175px;
    }

    .couple-name {
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 9px;
      text-transform: uppercase;
      color: #000;
      margin-bottom: 14px;
    }

    .bottom-rule {
      width: 100px;
      height: 1px;
      background: #000;
      margin: 0 auto 12px;
    }

    .date-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #666;
    }

    /* ── Screen-only controls ── */
    .controls {
      margin-top: 28px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 13px 30px;
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      border: 1.5px solid #000;
      background: #000;
      color: #fff;
      transition: background 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    .btn:hover { background: #333; }
    .btn.ghost { background: transparent; color: #000; }
    .btn.ghost:hover { background: #000; color: #fff; }

    /* ── Print ── */
    @media print {
      body { background: #fff; padding: 0; justify-content: flex-start; }
      .controls { display: none; }
      .card {
        width: 100%;
        max-width: 420px;
        margin: 0 auto;
        padding: 44px 38px 38px;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <p class="share-word">Share</p>
    <div class="script-love">the love</div>

    <div class="thin-line"></div>

    <p class="upload-heading">Share Your Photos With Us</p>
    <p class="upload-sub">Scan the QR Code &amp; Upload</p>

    <div class="qr-wrap">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=175x175&margin=6&data=https://wedding-photos-dbc2.onrender.com" alt="QR Code" />
    </div>

    <p class="couple-name">Ran &amp; Rox</p>
    <div class="bottom-rule"></div>
    <p class="date-text">17 · April · 2025</p>
  </div>

  <div class="controls">
    <button class="btn" onclick="window.print()">Print This Card</button>
    <a class="btn ghost" href="/">← Back to Upload</a>
  </div>


</body>
</html>
