<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages — Rannel & Roxanne</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #fafafa;
      --mid: #888;
      --gold: #c9a84c;
      --bg: #0f0f0f;
      --card: #161616;
      --border: #222;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
    }

    /* ── Login ── */
    #loginScreen {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      width: 100%; max-width: 360px;
      padding: 52px 44px;
      border: 1px solid var(--border);
      text-align: center;
      position: relative;
    }
    .login-box::before, .login-box::after,
    .login-box .c-tl, .login-box .c-br {
      content: ''; position: absolute;
      width: 16px; height: 16px;
    }
    .login-box::before  { top: -1px; left: -1px;  border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
    .login-box::after   { bottom: -1px; right: -1px; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }
    .login-box .c-tl    { top: -1px; right: -1px;  border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
    .login-box .c-br    { bottom: -1px; left: -1px; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }

    .login-ornament {
      display: flex; align-items: center; justify-content: center;
      gap: 14px; margin-bottom: 24px;
    }
    .login-ornament .l-line    { width: 36px; height: 1px; background: var(--gold); }
    .login-ornament .l-diamond { width: 6px; height: 6px; background: var(--gold); transform: rotate(45deg); }

    .login-box h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.9rem; font-weight: 300; letter-spacing: 4px;
      margin-bottom: 6px;
    }
    .login-box p {
      font-size: 0.65rem; font-weight: 300;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--mid); margin-bottom: 32px;
    }
    .login-box input {
      width: 100%;
      padding: 14px 18px;
      border: 1px solid #2a2a2a; background: #111;
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem; font-weight: 300;
      letter-spacing: 2px; outline: none;
      margin-bottom: 12px; transition: border-color 0.2s;
      text-align: center;
    }
    .login-box input:focus { border-color: var(--gold); }
    .login-box input::placeholder { color: #444; letter-spacing: 2px; }
    .login-btn {
      width: 100%; padding: 14px;
      background: transparent; border: 1px solid var(--white);
      color: var(--white);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem; font-style: italic;
      font-weight: 300; letter-spacing: 4px;
      cursor: pointer; transition: all 0.25s;
    }
    .login-btn:hover { background: var(--white); color: var(--black); }
    .login-error {
      color: #888; font-size: 0.65rem;
      letter-spacing: 2px; text-transform: uppercase;
      margin-top: 12px; display: none;
    }

    /* ── Main ── */
    #mainScreen { display: none; }

    header {
      border-bottom: 1px solid var(--border);
      padding: 52px 24px 44px;
      text-align: center;
    }
    .header-ornament {
      display: flex; align-items: center; justify-content: center;
      gap: 20px; margin-bottom: 24px;
    }
    .header-ornament .h-line    { width: 72px; height: 1px; background: var(--gold); }
    .header-ornament .h-diamond { width: 6px; height: 6px; background: var(--gold); transform: rotate(45deg); }

    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300; font-size: clamp(2rem, 5vw, 3.6rem);
      letter-spacing: 6px; margin-bottom: 8px;
    }
    header h1 .amp { font-style: italic; color: var(--gold); }
    header .subtitle {
      font-size: 0.65rem; font-weight: 300;
      letter-spacing: 3px; text-transform: uppercase; color: var(--mid);
    }

    .stats-bar {
      display: flex; justify-content: center; gap: 48px;
      margin-top: 32px; flex-wrap: wrap;
    }
    .stat .val {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem; font-weight: 300;
      display: block; line-height: 1;
    }
    .stat .lbl {
      font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase;
      color: var(--mid); margin-top: 4px; display: block;
    }

    /* Controls */
    .controls {
      max-width: 860px; margin: 0 auto;
      padding: 20px 24px 12px;
      display: flex; gap: 10px; flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }
    .filter-btn {
      padding: 8px 18px;
      border: 1px solid #2a2a2a; background: transparent;
      color: var(--mid);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.62rem; letter-spacing: 3px; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
    }
    .filter-btn.active { border-color: var(--white); color: var(--white); }
    .filter-btn:hover  { border-color: #555; color: var(--white); }

    /* Loading */
    #loading {
      text-align: center; padding: 80px 24px;
      color: #333; font-size: 0.68rem;
      letter-spacing: 3px; text-transform: uppercase;
    }
    .spinner {
      display: inline-block;
      width: 28px; height: 28px;
      border: 1px solid #222; border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-bottom: 18px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Message list */
    .message-list {
      max-width: 860px; margin: 0 auto;
      padding: 20px 24px 80px;
      display: flex; flex-direction: column; gap: 12px;
    }

    /* Message card */
    .msg-card {
      background: var(--card);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .msg-card:hover { border-color: #333; }

    .msg-header {
      padding: 20px 24px 16px;
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 12px;
      cursor: pointer;
    }
    .msg-info { flex: 1; min-width: 0; }

    .msg-guest {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.45rem; font-weight: 300;
      letter-spacing: 2px; color: var(--white);
      margin-bottom: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .msg-meta {
      display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
    }
    .msg-date {
      font-size: 0.62rem; letter-spacing: 2px;
      text-transform: uppercase; color: var(--mid);
    }
    .msg-type {
      font-size: 0.58rem; font-weight: 500;
      letter-spacing: 2px; text-transform: uppercase;
      padding: 3px 8px;
      border: 1px solid var(--border);
      color: var(--mid);
    }
    .msg-type.video { border-color: var(--gold); color: var(--gold); }
    .msg-duration {
      font-size: 0.62rem; letter-spacing: 1px; color: #555;
    }

    /* Expand toggle */
    .msg-toggle {
      width: 32px; height: 32px; flex-shrink: 0;
      border: 1px solid var(--border); background: transparent;
      color: var(--mid); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; transition: all 0.2s; align-self: center;
    }
    .msg-toggle:hover { border-color: var(--white); color: var(--white); }
    .msg-toggle.open { border-color: var(--gold); color: var(--gold); }

    /* Player area */
    .msg-player {
      display: none;
      padding: 0 24px 24px;
      border-top: 1px solid var(--border);
    }
    .msg-player.open { display: block; }

    .msg-player audio {
      width: 100%; margin-top: 16px;
      filter: invert(1) hue-rotate(180deg);
    }
    .msg-player video {
      width: 100%; max-height: 400px;
      margin-top: 16px; background: #000;
    }

    /* Empty state */
    #emptyState {
      display: none; text-align: center;
      padding: 80px 24px; color: #333;
    }
    #emptyState h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem; font-weight: 300; letter-spacing: 4px;
      margin-bottom: 12px;
    }
    #emptyState p {
      font-size: 0.65rem; letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="loginScreen">
    <div class="login-box">
      <div class="c-tl"></div><div class="c-br"></div>
      <div class="login-ornament">
        <div class="l-line"></div><div class="l-diamond"></div><div class="l-line"></div>
      </div>
      <h2>Messages</h2>
      <p>Private &nbsp;·&nbsp; Rannel &amp; Roxanne</p>
      <input type="password" id="adminKeyInput" placeholder="Enter Password" />
      <button class="login-btn" id="loginBtn">Open Messages</button>
      <div class="login-error" id="loginError">Incorrect password</div>
    </div>
  </div>

  <!-- Main -->
  <div id="mainScreen">
    <header>
      <div class="header-ornament">
        <div class="h-line"></div><div class="h-diamond"></div><div class="h-line"></div>
      </div>
      <h1>Rannel <span class="amp">&</span> Roxanne</h1>
      <div class="subtitle">Guest Messages &nbsp;·&nbsp; April 17, 2025</div>
      <div class="stats-bar">
        <div class="stat"><span class="val" id="totalCount">—</span><span class="lbl">Total</span></div>
        <div class="stat"><span class="val" id="voiceCount">—</span><span class="lbl">Voice</span></div>
        <div class="stat"><span class="val" id="videoCount">—</span><span class="lbl">Video</span></div>
      </div>
    </header>

    <div class="controls">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="voice-message">Voice</button>
      <button class="filter-btn" data-filter="video-message">Video</button>
    </div>

    <div class="message-list">
      <div id="loading"><div class="spinner"></div><div>Loading messages</div></div>
      <div id="messageContainer"></div>
      <div id="emptyState">
        <h3>No Messages Yet</h3>
        <p>Share the link with your guests</p>
      </div>
    </div>
  </div>

  <script>
    let allMessages = [];
    let filtered = [];

    document.getElementById('loginBtn').addEventListener('click', doLogin);
    document.getElementById('adminKeyInput').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    async function doLogin() {
      const key = document.getElementById('adminKeyInput').value.trim();
      if (!key) return;
      try {
        const res = await fetch(`/messages?key=${encodeURIComponent(key)}`);
        if (res.status === 401) {
          document.getElementById('loginError').style.display = 'block';
          return;
        }
        const data = await res.json();
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainScreen').style.display = 'block';
        loadMessages(data);
      } catch {
        const el = document.getElementById('loginError');
        el.style.display = 'block';
        el.textContent = 'Could not connect. Is the server running?';
      }
    }

    function loadMessages(data) {
      allMessages = data.messages || [];
      document.getElementById('loading').style.display = 'none';

      const voice = allMessages.filter(m => (m.tags || []).includes('voice-message')).length;
      const video = allMessages.filter(m => (m.tags || []).includes('video-message')).length;
      document.getElementById('totalCount').textContent = allMessages.length;
      document.getElementById('voiceCount').textContent = voice;
      document.getElementById('videoCount').textContent = video;

      applyFilter('all');
    }

    function applyFilter(type) {
      filtered = type === 'all'
        ? allMessages
        : allMessages.filter(m => (m.tags || []).includes(type));
      renderMessages();
    }

    function renderMessages() {
      const container = document.getElementById('messageContainer');
      container.innerHTML = '';

      if (filtered.length === 0) {
        document.getElementById('emptyState').style.display = 'block';
        return;
      }
      document.getElementById('emptyState').style.display = 'none';

      filtered.forEach((msg, index) => {
        const isVideo = (msg.tags || []).includes('video-message');
        const guestName = msg.context?.custom?.guest_name || 'Anonymous Guest';
        const date = new Date(msg.created_at).toLocaleDateString('en-US', {
          month: 'long', day: 'numeric', year: 'numeric',
          hour: 'numeric', minute: '2-digit'
        });
        const duration = msg.duration ? formatDuration(msg.duration) : '';

        const card = document.createElement('div');
        card.className = 'msg-card';

        card.innerHTML = `
          <div class="msg-header" onclick="togglePlayer(${index}, this)">
            <div class="msg-info">
              <div class="msg-guest">${escHtml(guestName)}</div>
              <div class="msg-meta">
                <span class="msg-date">${date}</span>
                <span class="msg-type${isVideo ? ' video' : ''}">${isVideo ? 'Video' : 'Voice'}</span>
                ${duration ? `<span class="msg-duration">${duration}</span>` : ''}
              </div>
            </div>
            <button class="msg-toggle" id="toggle-${index}">▶</button>
          </div>
          <div class="msg-player" id="player-${index}">
            ${isVideo
              ? `<video src="${msg.secure_url}" controls preload="none"></video>`
              : `<audio src="${msg.secure_url}" controls preload="none"></audio>`
            }
          </div>
        `;

        container.appendChild(card);
      });
    }

    function togglePlayer(index, headerEl) {
      const player = document.getElementById(`player-${index}`);
      const toggle = document.getElementById(`toggle-${index}`);
      const isOpen = player.classList.contains('open');

      // Close all others
      document.querySelectorAll('.msg-player.open').forEach(p => p.classList.remove('open'));
      document.querySelectorAll('.msg-toggle.open').forEach(t => { t.classList.remove('open'); t.textContent = '▶'; });
      // Pause all media
      document.querySelectorAll('.msg-player audio, .msg-player video').forEach(m => m.pause());

      if (!isOpen) {
        player.classList.add('open');
        toggle.classList.add('open');
        toggle.textContent = '■';
        // Auto-play
        const media = player.querySelector('audio, video');
        if (media) media.play().catch(() => {});
      }
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyFilter(btn.dataset.filter);
      });
    });

    function formatDuration(seconds) {
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    function escHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
