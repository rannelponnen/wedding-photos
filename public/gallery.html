<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Gallery — Rannel & Roxanne</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #fafafa;
      --off-white: #f5f2ef;
      --mid: #888;
      --light: #333;
      --gold: #c9a84c;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
    }

    /* ── Login ── */
    #loginScreen {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: var(--black);
    }
    .login-box {
      width: 100%; max-width: 380px;
      padding: 56px 48px;
      border: 1px solid #222;
      text-align: center;
      position: relative;
    }
    .login-box::before, .login-box::after,
    .login-box .c-tl, .login-box .c-br {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
    }
    .login-box::before  { top: -1px; left: -1px;  border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
    .login-box::after   { bottom: -1px; right: -1px; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }
    .login-box .c-tl    { top: -1px; right: -1px;  border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
    .login-box .c-br    { bottom: -1px; left: -1px; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }

    .login-ornament {
      display: flex; align-items: center; justify-content: center;
      gap: 14px; margin-bottom: 28px;
    }
    .login-ornament .l-line { width: 40px; height: 1px; background: var(--gold); }
    .login-ornament .l-diamond { width: 6px; height: 6px; background: var(--gold); transform: rotate(45deg); }

    .login-box h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 4px;
      margin-bottom: 6px;
    }
    .login-box p {
      font-size: 0.68rem;
      font-weight: 300;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 36px;
    }
    .login-box input {
      width: 100%;
      padding: 14px 18px;
      border: 1px solid #2a2a2a;
      background: #111;
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 2px;
      outline: none;
      margin-bottom: 14px;
      transition: border-color 0.2s;
      text-align: center;
    }
    .login-box input:focus { border-color: var(--gold); }
    .login-box input::placeholder { color: #444; letter-spacing: 2px; }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1px solid var(--white);
      color: var(--white);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-style: italic;
      font-weight: 300;
      letter-spacing: 4px;
      cursor: pointer;
      transition: all 0.25s;
    }
    .login-btn:hover { background: var(--white); color: var(--black); }
    .login-error {
      color: #aaa;
      font-size: 0.68rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 14px;
      display: none;
    }

    /* ── Gallery ── */
    #galleryScreen { display: none; }

    header {
      background: var(--black);
      border-bottom: 1px solid #1a1a1a;
      padding: 56px 24px 48px;
      text-align: center;
    }
    .header-ornament {
      display: flex; align-items: center; justify-content: center;
      gap: 20px; margin-bottom: 28px;
    }
    .header-ornament .h-line { width: 80px; height: 1px; background: var(--gold); }
    .header-ornament .h-diamond { width: 7px; height: 7px; background: var(--gold); transform: rotate(45deg); }

    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.2rem, 6vw, 4rem);
      letter-spacing: 6px;
      margin-bottom: 10px;
    }
    header h1 .amp { font-style: italic; color: var(--gold); }
    header .subtitle {
      font-size: 0.68rem;
      font-weight: 300;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--mid);
    }

    .stats-bar {
      display: flex; justify-content: center; gap: 48px;
      margin-top: 36px; flex-wrap: wrap;
    }
    .stat .val {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem; font-weight: 300;
      display: block; line-height: 1;
    }
    .stat .lbl {
      font-size: 0.62rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--mid);
      margin-top: 4px;
      display: block;
    }

    /* Controls */
    .controls {
      max-width: 1300px; margin: 0 auto;
      padding: 28px 24px 8px;
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
      border-bottom: 1px solid #1a1a1a;
    }
    .filter-btn {
      padding: 8px 20px;
      border: 1px solid #2a2a2a;
      background: transparent;
      color: var(--mid);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn.active { border-color: var(--white); color: var(--white); }
    .filter-btn:hover  { border-color: var(--mid); color: var(--white); }

    /* Loading */
    #loading {
      text-align: center; padding: 100px 24px;
      color: #333; font-size: 0.72rem;
      letter-spacing: 3px; text-transform: uppercase;
    }
    .spinner {
      display: inline-block;
      width: 32px; height: 32px;
      border: 1px solid #222;
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Grid */
    .gallery-grid {
      max-width: 1300px; margin: 0 auto;
      padding: 20px 24px 100px;
      columns: 4; column-gap: 8px;
    }
    @media (max-width: 1000px) { .gallery-grid { columns: 3; } }
    @media (max-width: 650px)  { .gallery-grid { columns: 2; } }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: 8px;
      position: relative;
      cursor: pointer;
      overflow: hidden;
      background: #111;
    }
    .gallery-item img, .gallery-item video {
      width: 100%;
      display: block;
      filter: grayscale(15%);
      transition: filter 0.3s, transform 0.4s;
    }
    .gallery-item:hover img, .gallery-item:hover video {
      filter: grayscale(0%);
      transform: scale(1.03);
    }
    .gallery-item .overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 55%);
      opacity: 0; transition: opacity 0.3s;
      display: flex; align-items: flex-end; padding: 14px;
    }
    .gallery-item:hover .overlay { opacity: 1; }
    .overlay .guest-name {
      font-size: 0.7rem; letter-spacing: 1px;
      color: rgba(255,255,255,0.8);
      text-transform: uppercase;
    }
    .video-badge {
      position: absolute; top: 8px; left: 8px;
      background: var(--black);
      color: var(--white);
      border: 1px solid #333;
      font-size: 0.6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 3px 8px;
    }

    /* Empty */
    #emptyState {
      display: none; text-align: center;
      padding: 100px 24px; color: #333;
    }
    #emptyState p {
      font-size: 0.72rem;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.96);
      z-index: 1000;
      align-items: center; justify-content: center; flex-direction: column;
    }
    #lightbox.open { display: flex; }
    #lightbox img, #lightbox video {
      max-width: 88vw; max-height: 78vh;
      object-fit: contain;
    }
    .lightbox-close {
      position: fixed; top: 20px; right: 24px;
      background: transparent;
      border: 1px solid #333;
      color: var(--white);
      width: 44px; height: 44px;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s;
      letter-spacing: 0;
    }
    .lightbox-close:hover { border-color: var(--white); }
    .lightbox-info {
      margin-top: 16px;
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #555;
    }
    .lightbox-nav {
      position: fixed; top: 50%; transform: translateY(-50%);
      background: transparent;
      border: 1px solid #2a2a2a;
      color: var(--white);
      width: 48px; height: 48px;
      font-size: 22px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s;
    }
    .lightbox-nav:hover { border-color: var(--white); }
    #navPrev { left: 20px; }
    #navNext { right: 20px; }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="loginScreen">
    <div class="login-box">
      <div class="c-tl"></div>
      <div class="c-br"></div>
      <div class="login-ornament">
        <div class="l-line"></div>
        <div class="l-diamond"></div>
        <div class="l-line"></div>
      </div>
      <h2>Our Gallery</h2>
      <p>Private · Rannel &amp; Roxanne</p>
      <input type="password" id="adminKeyInput" placeholder="Enter Password" />
      <button class="login-btn" id="loginBtn">Enter Gallery</button>
      <div class="login-error" id="loginError">Incorrect password</div>
    </div>
  </div>

  <!-- Gallery -->
  <div id="galleryScreen">
    <header>
      <div class="header-ornament">
        <div class="h-line"></div>
        <div class="h-diamond"></div>
        <div class="h-line"></div>
      </div>
      <h1>Rannel <span class="amp">&</span> Roxanne</h1>
      <div class="subtitle">Wedding Gallery &nbsp;·&nbsp; April 17, 2025</div>
      <div class="stats-bar">
        <div class="stat"><span class="val" id="totalCount">—</span><span class="lbl">Total</span></div>
        <div class="stat"><span class="val" id="photoCount">—</span><span class="lbl">Photos</span></div>
        <div class="stat"><span class="val" id="videoCount">—</span><span class="lbl">Videos</span></div>
      </div>
    </header>

    <div class="controls">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="image">Photos</button>
      <button class="filter-btn" data-filter="video">Videos</button>
    </div>

    <div id="loading"><div class="spinner"></div><div>Loading memories</div></div>
    <div class="gallery-grid" id="galleryGrid"></div>
    <div id="emptyState"><p>No photos yet — share the link with your guests</p></div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox">
    <button class="lightbox-close" id="lightboxClose">✕</button>
    <button class="lightbox-nav" id="navPrev">‹</button>
    <button class="lightbox-nav" id="navNext">›</button>
    <div id="lightboxMedia"></div>
    <div class="lightbox-info" id="lightboxInfo"></div>
  </div>

  <script>
    let allMedia = [], filtered = [], currentIndex = 0;

    document.getElementById('loginBtn').addEventListener('click', doLogin);
    document.getElementById('adminKeyInput').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    async function doLogin() {
      const key = document.getElementById('adminKeyInput').value.trim();
      if (!key) return;
      try {
        const res = await fetch(`/gallery?key=${encodeURIComponent(key)}`);
        if (res.status === 401) { document.getElementById('loginError').style.display = 'block'; return; }
        const data = await res.json();
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('galleryScreen').style.display = 'block';
        loadGallery(data);
      } catch {
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('loginError').textContent = 'Could not connect. Is the server running?';
      }
    }

    function loadGallery(data) {
      allMedia = data.media || [];
      document.getElementById('loading').style.display = 'none';
      document.getElementById('totalCount').textContent = allMedia.length;
      document.getElementById('photoCount').textContent = allMedia.filter(m => m.type === 'image').length;
      document.getElementById('videoCount').textContent = allMedia.filter(m => m.type === 'video').length;
      applyFilter('all');
    }

    function applyFilter(type) {
      filtered = type === 'all' ? allMedia : allMedia.filter(m => m.type === type);
      renderGrid();
    }

    function renderGrid() {
      const grid = document.getElementById('galleryGrid');
      grid.innerHTML = '';
      if (filtered.length === 0) { document.getElementById('emptyState').style.display = 'block'; return; }
      document.getElementById('emptyState').style.display = 'none';

      filtered.forEach((item, index) => {
        const el = document.createElement('div');
        el.className = 'gallery-item';
        el.onclick = () => openLightbox(index);

        if (item.type === 'video') {
          const vid = document.createElement('video');
          vid.src = item.secure_url; vid.muted = true; vid.loop = true;
          vid.addEventListener('mouseenter', () => vid.play());
          vid.addEventListener('mouseleave', () => { vid.pause(); vid.currentTime = 0; });
          el.appendChild(vid);
          const badge = document.createElement('span');
          badge.className = 'video-badge'; badge.textContent = 'Video';
          el.appendChild(badge);
        } else {
          const img = document.createElement('img');
          img.src = item.secure_url.replace('/upload/', '/upload/w_500,c_fill,q_auto,f_auto/');
          img.alt = 'Wedding photo'; img.loading = 'lazy';
          el.appendChild(img);
        }

        const overlay = document.createElement('div');
        overlay.className = 'overlay';
        const guestName = item.context?.custom?.guest_name || '';
        if (guestName) overlay.innerHTML = `<span class="guest-name">${guestName}</span>`;
        el.appendChild(overlay);
        grid.appendChild(el);
      });
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyFilter(btn.dataset.filter);
      });
    });

    function openLightbox(index) {
      currentIndex = index;
      renderLightbox();
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
      document.getElementById('lightboxMedia').innerHTML = '';
    }

    function renderLightbox() {
      const item = filtered[currentIndex];
      const container = document.getElementById('lightboxMedia');
      container.innerHTML = '';
      if (item.type === 'video') {
        const vid = document.createElement('video');
        vid.src = item.secure_url; vid.controls = true; vid.autoplay = true;
        container.appendChild(vid);
      } else {
        const img = document.createElement('img');
        img.src = item.secure_url; img.alt = 'Wedding photo';
        container.appendChild(img);
      }
      const guestName = item.context?.custom?.guest_name || '';
      const date = new Date(item.created_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
      document.getElementById('lightboxInfo').textContent = guestName ? `${guestName}  ·  ${date}` : date;
      document.getElementById('navPrev').style.visibility = currentIndex > 0 ? 'visible' : 'hidden';
      document.getElementById('navNext').style.visibility = currentIndex < filtered.length - 1 ? 'visible' : 'hidden';
    }

    document.getElementById('lightboxClose').onclick = closeLightbox;
    document.getElementById('navPrev').onclick = () => { if (currentIndex > 0) { currentIndex--; renderLightbox(); } };
    document.getElementById('navNext').onclick = () => { if (currentIndex < filtered.length - 1) { currentIndex++; renderLightbox(); } };
    document.getElementById('lightbox').addEventListener('click', e => { if (e.target === document.getElementById('lightbox')) closeLightbox(); });
    document.addEventListener('keydown', e => {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft' && currentIndex > 0) { currentIndex--; renderLightbox(); }
      if (e.key === 'ArrowRight' && currentIndex < filtered.length - 1) { currentIndex++; renderLightbox(); }
    });
  </script>
</body>
</html>
